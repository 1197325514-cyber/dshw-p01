project:
  type: book
  output-dir: docs

book:
  title: "P01：金融数据获取、管理与初步分析"
  author: "林川胜"
  date: "2026年4月"
  date-format: "YYYY年MM月"
  chapters:
    - index.qmd
    - part: "数据篇"
      chapters:
        - chapters/01-download.qmd
        - chapters/02-clean.qmd
    - part: "分析篇"
      chapters:
        - chapters/03-analysis.qmd
        - chapters/04-capm.qmd
        - chapters/05-macro.qmd
    - summary.qmd
  sidebar:
    style: floating
    search: true
  sharing: [twitter, facebook, linkedin]
  page-footer:
    left: |
      P01：金融数据获取、管理与初步分析
    right: |
      由Quarto构建
  site-url: https://1197325514-cyber.github.io/dshw-p01/
  repo-url: https://github.com/1197325514-cyber/dshw-p01
  repo-actions: [edit, issue]

format:
  html:
    theme:
      light: cosmo
      dark: cyborg
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-summary: "显示代码"
    code-tools: true
    code-block-bg: true
    highlight-style: github
    df-print: paged
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

language:
  title-block-author-single: "作者"
  title-block-published: "发布日期"
  toc-title: "目录"
  chapter-title: "章"
  appendix-title: "附录"
  callout-tip-title: "提示"
  callout-note-title: "注意"
  callout-warning-title: "警告"
  callout-important-title: "重要"

crossref:
  fig-title: "图"
  tbl-title: "表"
  eq-title: "公式"
  fig-prefix: "图"
  tbl-prefix: "表"
  eq-prefix: "公式"
